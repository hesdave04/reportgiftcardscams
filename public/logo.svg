<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Transparent background (no rect) -->

  <defs>
    <style>
      .navy { fill: #0F3566; }
      .red { fill: #C61F26; }
      .dark { fill: #1A1A1A; }
      .stroke-navy { stroke: #0F3566; }
      .wordmark {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .org {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>

  <!-- Shield -->
  <g transform="translate(80,40)">
    <path class="navy" d="
      M200 20
      C250 50, 320 70, 400 80
      V200
      C400 300, 320 380, 200 440
      C80 380, 0 300, 0 200
      V80
      C80 70, 150 50, 200 20
      Z"/>

    <!-- Inner border -->
    <path d="
      M200 50
      C245 75, 305 90, 370 98
      V195
      C370 280, 305 340, 200 395
      C95 340, 30 280, 30 195
      V98
      C95 90, 155 75, 200 50
      Z"
      fill="none" stroke="#FFFFFF" stroke-width="12"/>

    <!-- Exclamation -->
    <rect x="185" y="120" width="30" height="90" rx="6" fill="#FFFFFF"/>
    <circle cx="200" cy="235" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Text -->
  <g transform="translate(520,260)">
    <text x="0" y="0" font-size="90" class="wordmark navy">Scam</text>
    <text x="260" y="0" font-size="90" class="wordmark red">Complaints</text>
    <text x="860" y="0" font-size="50" class="org dark">.org</text>

    <!-- underline -->
    <path d="M0 60 C300 45, 700 45, 1100 60"
          fill="none"
          stroke="#C61F26"
          stroke-width="6"
          stroke-linecap="round"/>
  </g>

</svg>
