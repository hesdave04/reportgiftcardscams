<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#174A7C"/>
      <stop offset="100%" stop-color="#0D2F57"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EDF3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
    <style>
      .wordmark {
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .org {
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect width="1400" height="420" fill="white"/>

  <!-- Icon -->
  <g transform="translate(170,40)" filter="url(#softShadow)">
    <!-- Shield -->
    <path d="M180 18
             C220 48, 276 60, 320 66
             V168
             C320 246, 262 309, 180 346
             C98 309, 40 246, 40 168
             V66
             C84 60, 140 48, 180 18Z"
          fill="url(#shieldGrad)"/>

    <path d="M180 40
             C212 62, 256 71, 292 76
             V163
             C292 226, 245 278, 180 309
             C115 278, 68 226, 68 163
             V76
             C104 71, 148 62, 180 40Z"
          fill="none" stroke="white" stroke-width="10" opacity="0.95"/>

    <!-- Left stripes -->
    <rect x="80" y="106" width="74" height="16" rx="4" fill="white" opacity="0.95" transform="rotate(-8 80 106)"/>
    <rect x="84" y="142" width="70" height="16" rx="4" fill="white" opacity="0.95" transform="rotate(-8 84 142)"/>
    <rect x="89" y="178" width="64" height="16" rx="4" fill="white" opacity="0.95" transform="rotate(-8 89 178)"/>

    <!-- Stars -->
    <g fill="white">
      <path d="M99 77l5.3 10.8 11.9 1.7-8.6 8.4 2 11.8L99 104l-10.6 5.6 2-11.8-8.6-8.4 11.9-1.7L99 77Z"/>
      <path d="M145 64l5.3 10.8 11.9 1.7-8.6 8.4 2 11.8L145 91l-10.6 5.6 2-11.8-8.6-8.4 11.9-1.7L145 64Z"/>
      <path d="M193 58l5.3 10.8 11.9 1.7-8.6 8.4 2 11.8L193 85l-10.6 5.6 2-11.8-8.6-8.4 11.9-1.7L193 58Z"/>
    </g>

    <!-- Magnifying glass -->
    <g>
      <circle cx="230" cy="146" r="82" fill="url(#lensGrad)" stroke="#D5DEE7" stroke-width="6"/>
      <circle cx="230" cy="146" r="92" fill="none" stroke="#1A4D80" stroke-width="18"/>
      <rect x="125" y="220" width="108" height="28" rx="14" fill="#1A4D80" transform="rotate(-45 125 220)"/>
      <rect x="132" y="224" width="82" height="12" rx="6" fill="#376A9B" opacity="0.45" transform="rotate(-45 132 224)"/>
    </g>

    <!-- Exclamation -->
    <rect x="216" y="92" width="28" height="88" rx="10" fill="#C91F1F"/>
    <circle cx="230" cy="210" r="17" fill="#C91F1F"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(500,210)">
    <text x="0" y="0" font-size="86" class="wordmark" fill="#123E6D">Scam</text>
    <text x="260" y="0" font-size="86" class="wordmark" fill="#C91F1F">Complaints</text>
    <text x="820" y="0" font-size="58" class="org" fill="#123E6D">.org</text>

    <!-- subtle underline -->
    <path d="M82 48 C250 38, 440 38, 610 48" stroke="#C91F1F" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
    <path d="M650 48 C760 40, 860 41, 950 48" stroke="#C91F1F" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
    <rect x="618" y="20" width="10" height="44" rx="5" fill="#C91F1F"/>
  </g>
</svg>
